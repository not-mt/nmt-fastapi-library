<nav id="sidebar" class="w-56 bg-white border-r border-stone-200 flex flex-col flex-shrink-0">

    <!-- Toggle button -->
    <div class="px-3 py-3 flex justify-end">
        <button onclick="toggleSidebar()"
                class="p-1 rounded-md text-stone-400 hover:text-stone-600 hover:bg-stone-100 transition-colors cursor-pointer"
                title="Toggle sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" class="sidebar-toggle-icon h-5 w-5 transition-transform" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
    </div>

    <!-- Navigation links -->
    <div class="flex-1 overflow-y-auto overflow-x-hidden py-2 px-3 space-y-1">

        {% for item in nav_items %}
            {# Section divider #}
            {% if item.section %}
            <div class="pt-4 mt-4 border-t border-stone-200">
                <p class="sidebar-section-label px-3 text-xs font-semibold text-stone-400 uppercase tracking-wider mb-2">{{ item.section }}</p>
            </div>
            {% endif %}

            <a class="nav-link flex items-center gap-3 px-3 py-2 text-sm font-medium text-stone-700 rounded-lg hover:bg-stone-100 hover:text-brand-600 transition-colors cursor-pointer"
               hx-get="{{ item.url }}"
               hx-target="#main-content"
               hx-swap="innerHTML"
               hx-push-url="true"
               onclick="closeDetailPanel()"
               title="{{ item.label }}">
                {{ item.icon_svg | safe }}
                <span class="sidebar-label">{{ item.label }}</span>
            </a>
        {% endfor %}

    </div>

    <!-- Footer: user, settings, logout -->
    <div class="px-3 py-3 border-t border-stone-200 space-y-1 overflow-x-hidden">

        {% if session %}
        <!-- Profile -->
        <a class="nav-link sidebar-footer-item flex items-center gap-3 px-3 py-2 text-sm font-medium text-stone-700 rounded-lg hover:bg-stone-100 hover:text-brand-600 transition-colors cursor-pointer"
           hx-get="/ui/v1/profile"
           hx-target="#main-content"
           hx-swap="innerHTML"
           hx-push-url="true"
           onclick="closeDetailPanel()"
           title="Profile">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="sidebar-label">Profile</span>
        </a>
        {% endif %}

        <!-- Settings -->
        <button onclick="openModal('/ui/v1/settings')"
                class="sidebar-footer-item w-full flex items-center gap-3 px-3 py-2 text-sm font-medium text-stone-700 rounded-lg hover:bg-stone-100 hover:text-brand-600 transition-colors cursor-pointer"
                title="Settings">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span class="sidebar-label">Settings</span>
        </button>

        <!-- Logout -->
        <a href="/ui/v1/auth/logout"
           class="sidebar-footer-item flex items-center gap-3 px-3 py-2 text-sm font-medium text-stone-700 rounded-lg hover:bg-stone-100 hover:text-rose-600 transition-colors cursor-pointer"
           title="Logout">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span class="sidebar-label">Logout</span>
        </a>

    </div>

</nav>
