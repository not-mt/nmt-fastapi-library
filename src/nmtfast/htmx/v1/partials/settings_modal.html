<div class="flex h-[70vh]">

    <!-- Settings sidebar -->
    <div class="w-48 border-r border-stone-200 py-4 px-3 space-y-1 overflow-y-auto flex-shrink-0">
        {% for section in settings_sections %}
            <button class="settings-nav-item w-full flex items-center gap-2 px-3 py-2 text-sm font-medium rounded-lg transition-colors cursor-pointer
                           {% if section.active %}bg-stone-100 text-brand-600{% else %}text-stone-700 hover:bg-stone-100 hover:text-brand-600{% endif %}"
                    hx-get="{{ section.url }}"
                    hx-target="#settings-content"
                    hx-swap="innerHTML"
                    onclick="document.querySelectorAll('.settings-nav-item').forEach(el => { el.classList.remove('bg-stone-100', 'text-brand-600'); el.classList.add('text-stone-700'); }); this.classList.add('bg-stone-100', 'text-brand-600'); this.classList.remove('text-stone-700');">
                {{ section.icon_svg | safe }}
                {{ section.label }}
            </button>
        {% endfor %}
    </div>

    <!-- Settings content pane -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- Modal header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-stone-200 flex-shrink-0">
            <h2 class="text-lg font-bold text-stone-800">Settings</h2>
            <button onclick="closeModal()"
                    class="p-1 rounded-md text-stone-400 hover:text-stone-600 hover:bg-stone-100 transition-colors cursor-pointer"
                    title="Close">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- Scrollable content -->
        <div id="settings-content" class="flex-1 overflow-y-auto p-6">
            {% if _settings_partial is defined and _settings_partial %}
                {% include _settings_partial %}
            {% endif %}
        </div>

    </div>

</div>
