<div class="p-6 space-y-4">
    <div class="flex items-center gap-3 mb-4">
        <div class="bg-rose-100 rounded-full p-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-rose-600" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
        </div>
        <div>
            <h3 class="text-lg font-bold text-stone-800">Delete Failed</h3>
            <p class="text-sm text-stone-500">{{ error_status }} error</p>
        </div>
    </div>

    <div class="bg-rose-50 border border-rose-200 rounded-lg p-3">
        <p class="text-sm text-rose-700">{{ error_message }}</p>
    </div>

    <div class="mt-6">
        <button type="button" onclick="closeDeleteModal()"
                class="w-full bg-white border border-stone-300 text-stone-700 hover:bg-stone-50 px-4 py-2 rounded-lg text-sm font-medium transition-colors cursor-pointer">
            Close
        </button>
    </div>
</div>
