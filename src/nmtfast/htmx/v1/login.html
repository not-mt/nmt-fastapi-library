<!DOCTYPE html>
<html lang="en">
<head>
    {% include "v1/partials/_head.html" %}
    <title>Sign In</title>
</head>
<body class="min-h-screen bg-stone-50 flex items-center justify-center px-4">

    <div class="w-full max-w-md">
        <!-- Sign In Card -->
        <div class="bg-white rounded-xl shadow-sm border border-stone-200 p-8">
            <h1 class="text-2xl font-bold text-stone-800 mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Sign In
            </h1>

            {% if error %}
            <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <p class="text-sm text-stone-600 mb-6">
                Use your organization's identity provider to continue.
            </p>

            <a href="{{ auth_login_url | default('/ui/v1/auth/login') }}"
               class="block w-full text-center bg-brand-500 hover:bg-brand-600 text-white font-semibold py-3 px-4 rounded-lg transition-colors">
                Continue with SSO
            </a>
        </div>
    </div>

</body>
</html>
